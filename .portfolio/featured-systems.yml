  featured: true
- slug: aws-multi-compute-pci-payments-platform
  axis_scores:
    technical_depth: 9
    voice: 6
    validation: 6
  axis_reasoning:
    technical_depth: The broadest compute surface here, running one Flask workload
      across ECS on EC2, Fargate, and EKS behind weighted target groups while a serverless
      backbone handles ingestion, with a 10 percent canary deployment config and awsvpc
      task-level ENI isolation documented in ADR-002.
    voice: The weakest writing among the deep systems, stacking raises visibility,
      raises scalability, and raises governance across sections while most paragraphs
      open with detached constructions rather than a named decision.
    validation: The scan gate demo is real and the doc is admirably honest that it
      does not constitute complete PCI-DSS certification evidence, but k6 was flagged
      as missing at setup and no load, chaos, or DLQ result reports an actual number,
      leaving verified traffic distribution behavior unquantified.
  average: 7.0
  rationale: One payment workload across ECS, Fargate, EKS, and Lambda behind a scan
    gate
  featured: false
- slug: aws-multi-region-dr-tiering
  axis_scores:
    technical_depth: 7
    voice: 8
    validation: 8
  axis_reasoning:
    technical_depth: Tiering logic is sound with workloads mapped across active-active
      through backup-only and ADR-04 selecting Aurora on a 30s versus 60-120s failover
      argument, but the whole stack runs against LocalStack emulation rather than
      live AWS, which caps how much production shape it can claim.
    voice: Concrete and financially grounded, tying checkout to active-active through
      the $100K per minute exposure and the prior 47-minute outage at roughly $4.7M
      rather than asserting the tier abstractly.
    validation: Gameday forced failures under active Locust load with checkout RTO
      measured at 23s against a 60s target, RTO exported as JSON artifacts, four of
      four scenarios passing, and a ransomware drill where Vault Lock blocked deletion
      under simulated admin compromise.
  average: 7.67
  rationale: DR tiers priced per nine, checkout failover measured at 23s against a
    60s target
  featured: false
- slug: aws-multi-region-edge-failover-platform
  axis_scores:
    technical_depth: 8
    voice: 7
    validation: 8
  axis_reasoning:
    technical_depth: Two independent failover layers are argued cleanly, with CloudFront
      origin groups recovering ahead of DNS cache expiry and Global Accelerator supplying
      two static Anycast IPv4 addresses for partner firewall allowlisting, plus Lambda@Edge
      signed URL validation at origin-request.
    voice: Competent but noticeably passive next to the top systems, leaning on generic
