- slug: zero-key-aws-security-architecture
  axis_scores:
    technical_depth: 9
    voice: 7
    validation: 8
  axis_reasoning:
    technical_depth: 'Thirteen phases and the widest control surface in the lens:
      AD Connector federation for 3,000 users, GitHub OIDC with permission boundaries
      denying iam:CreateUser and cloudtrail:StopLogging, multi-region KMS envelope
      encryption, ABAC session tags, and WorkSpaces failover by ConnectionIdentifier.'
    voice: Technically precise and strong on distinctions such as key policies versus
      grants, but a repeated filler pattern (raises resiliency, raises deployment
      predictability, raises operational maintainability) dulls the edge.
    validation: The red-team phase lands four attacks against four blocks across STS,
      KMS, S3 Object Lock, and session-tag bypass, and rotation is proven through
      AWSCURRENT, AWSPREVIOUS, and AWSPENDING staging labels, but the blocks are described
      qualitatively without measured artifacts.
  average: 8.0
  rationale: Long-lived credentials removed, then red-teamed with four attacks and
    four blocks
  featured: true
