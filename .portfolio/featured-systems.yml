- slug: aws-hybrid-cloud-network-architecture
  axis_scores:
    technical_depth: 9
    voice: 8
    validation: 9
  axis_reasoning:
    technical_depth: 'Nine phases of real networking depth: Transit Gateway with propagation
      deliberately disabled for explicit spoke and inspection route table association,
      strongSwan plus FRRouting customer gateway, Suricata inspection, RAM sharing,
      and bidirectional Route 53 resolver endpoints.'
    voice: Specific and decision-led, naming why Transit Gateway is required because
      VPC peering is non-transitive, though a few swept words such as sharpens segmentation
      sit in otherwise clean prose.
    validation: The failover drill measured 38s BGP reconvergence against a 60s target
      with three ICMP packets timed out and four accepted BGP routes on the secondary
      tunnel, and the doc argues why control-plane analysis and data-plane tests are
      both required for sign-off.
  average: 8.67
  rationale: Hybrid network proving 38s BGP reconvergence under a forced tunnel failure
  featured: true
- slug: aws-landing-zone-soc2-governance
  axis_scores:
    technical_depth: 8
    voice: 8
    validation: 8
  axis_reasoning:
    technical_depth: 'Ten phases of inherited governance: a four-OU topology with
      SCP inheritance by OU placement, StackSets auto-deploying CloudTrail, Config,
