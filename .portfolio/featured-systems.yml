- slug: aws-finops-command-center
  axis_scores:
    technical_depth: 8
    voice: 7
    validation: 7
  axis_reasoning:
    technical_depth: Nine phases wiring CUR 2.0 through Glue and Athena into Grafana,
      with a dual remediation pattern gating on the Environment tag so non-prod auto-stops
      while production holds for approval, and Budget Actions as a static backstop
