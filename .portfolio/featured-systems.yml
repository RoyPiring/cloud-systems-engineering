      gotcha that a WebACL does not enforce until associated.
  average: 7.67
  rationale: Two-layer edge failover measured at 1.1s with static Anycast IPs for
    partners
  featured: false
- slug: aws-polyglot-persistence-trading-lab
  axis_scores:
    technical_depth: 8
    voice: 6
    validation: 6
  axis_reasoning:
    technical_depth: Three engines deployed as 52 resources across modular Terraform,
      with ADR-001 prioritizing DynamoDB plus DAX because trade lookups sit in the
      transaction path, extended by an Aurora I/O-Optimized break-even analysis and
      a Babelfish TDS compatibility proof.
